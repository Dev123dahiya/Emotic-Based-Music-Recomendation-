services:
  - type: web
    name: emotic-based-music-recommendation
    runtime: python
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
